  <rect x="5" y="0" width="1" height="1" fill="#111"/>
  <rect x="6" y="1" width="1" height="2" fill="#111"/>
  <rect x="2" y="5" width="2" height="3" fill="#111"/>
  <rect x="1" y="6" width="1" height="2" fill="#111"/>
  <rect x="4" y="6" width="1" height="2" fill="#111"/>
</svg>
